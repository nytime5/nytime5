baseURL = "https://nytime5.com"
title = "The New York Time5"
languageCode = "en-us"

# Clean URLs
[permalinks]
  [permalinks.page]
    '/' = '/:year/:month/:day/:slugorfilename/'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[pagination]
  pagerSize = 20

[params]
  description = "All the News That's Fit to Fabricate"

# Mount posts/ as both content and static so images are served
[[module.mounts]]
  source = "posts"
  target = "content"

[[module.mounts]]
  source = "posts"
  target = "static/posts"
  includeFiles = "**/*.jpg"

[[module.mounts]]
  source = "assets"
  target = "assets"

[[module.mounts]]
  source = "static"
  target = "static"
